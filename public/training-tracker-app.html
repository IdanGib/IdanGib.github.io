<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0e0f0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Training Tracker</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0e0f0d;
  --panel:#161814;
  --panel2:#1c1f18;
  --line:#252921;
  --ink:#f2f0e6;
  --muted:#8a8d80;
  --faint:#454840;
  --lime:#c6f73f;
  --lime-dim:#7e9a2a;
  --lime-bg:rgba(198,247,63,.10);
  --rust:#e0703a;
  --rust-bg:rgba(224,112,58,.10);
  --blue:#4a90d9;
  --shadow:0 2px 16px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{touch-action:manipulation}
html{background:var(--bg)}
body{background:var(--bg);color:var(--ink);font-family:"DM Sans",sans-serif;min-height:100svh}

.app{max-width:430px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column}

/* ── Top bar ── */
.topbar{
  position:sticky;top:0;z-index:20;
  padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;
  background:rgba(14,15,13,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
}
.topbar-title{font:800 11px/1 "JetBrains Mono",monospace;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}

/* ── Scroll body ── */
.scroll-body{
  flex:1;
  padding:14px 14px calc(env(safe-area-inset-bottom,0px) + 28px);
  display:flex;flex-direction:column;gap:8px;
}

/* ── Today card ── */
.today-card{
  background:var(--panel);border:1px solid var(--line);border-radius:20px;
  padding:18px 18px 16px;box-shadow:var(--shadow);
}
.today-date{
  font:700 10px/1 "JetBrains Mono",monospace;letter-spacing:.12em;
  text-transform:uppercase;color:var(--faint);margin-bottom:10px;
}
.phase-row{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.phase-dot{width:10px;height:10px;border-radius:50%;flex:none}
.phase-dot.train{background:var(--lime)}
.phase-dot.rest{background:var(--blue)}
.phase-dot.deload{background:var(--rust)}
.phase-dot.pre{background:var(--faint)}
.phase-text{font:700 21px/1 "DM Sans",sans-serif}
.today-sub{font:500 13px/1.3 "DM Sans",sans-serif;color:var(--muted);margin-bottom:14px;padding-left:20px}
.cyc-bar{height:4px;background:var(--panel2);border-radius:99px;overflow:hidden}
.cyc-bar-fill{height:100%;background:linear-gradient(90deg,var(--lime-dim),var(--lime));border-radius:99px;transition:width .5s ease}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 12px 12px;box-shadow:var(--shadow)}
.stat-k{font:700 9px/1 "JetBrains Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:7px}
.stat-v{font-family:"Anton",sans-serif;font-size:26px;line-height:.9;letter-spacing:.01em}
.stat-v .sm{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;color:var(--muted);letter-spacing:0}

/* ── Cycle nav ── */
.cycle-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 2px}
.cycle-label{font-family:"Anton",sans-serif;font-size:20px;letter-spacing:.02em;text-transform:uppercase}
.cycle-label em{color:var(--lime);font-style:normal}
.nav-seg{
  display:flex;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:3px;gap:2px;
}
button.nav-btn{
  font:700 11px/1 "JetBrains Mono",monospace;letter-spacing:.06em;text-transform:uppercase;
  background:transparent;color:var(--muted);border:none;border-radius:8px;
  padding:9px 12px;cursor:pointer;transition:.12s;
}
button.nav-btn:active{color:var(--lime);background:var(--panel2)}
button.nav-btn.solid{background:var(--lime);color:#13160d}
button.nav-btn.solid:active{filter:brightness(1.06)}

/* ── Calendar ── */
.cal-wrap{
  background:var(--panel);border:1px solid var(--line);border-radius:20px;
  padding:14px 10px 16px;box-shadow:var(--shadow);
}
#weeks{display:flex;flex-direction:column;gap:3px}
.cal-head,.week-row{
  display:grid;
  grid-template-columns:22px repeat(7,1fr);
  gap:3px;align-items:center;
}
.cal-head{margin-bottom:6px}
.cal-dow{text-align:center;font:700 10px/1 "JetBrains Mono",monospace;letter-spacing:.04em;color:var(--faint);text-transform:uppercase}
.wn{text-align:center;font:800 10px/1 "JetBrains Mono",monospace;color:var(--faint)}
.week-row.deload{margin-top:5px;padding-top:6px;border-top:1px solid var(--line)}
.week-row.deload .wn{color:var(--rust)}

/* Day cells */
.day-cell{
  aspect-ratio:1;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font:700 12px/1 "JetBrains Mono",monospace;
  position:relative;user-select:none;-webkit-user-select:none;
}
.day-cell.train{
  border:1.5px solid var(--lime-dim);color:var(--ink);
  cursor:pointer;background:transparent;transition:.1s;
}
.day-cell.train:active{transform:scale(.88);background:var(--lime-bg)}
.day-cell.train.done{background:var(--lime);border-color:var(--lime);color:#13160d;font-weight:800}
.day-cell.tod{outline:2px solid var(--ink);outline-offset:2px}
.day-cell.train.done.tod{outline-color:var(--lime)}
.day-cell.rest.tod,.day-cell.deload-d.tod{outline-color:rgba(242,240,230,.35)}
.day-cell.rest{color:var(--faint);font-size:11px;font-weight:400}
.day-cell.deload-d{color:var(--rust);opacity:.6;font-size:11px}
.day-cell.deload-d.tod{opacity:1}

/* ── Legend ── */
.legend{
  display:flex;gap:14px;flex-wrap:wrap;
  font:500 11px/1 "DM Sans",sans-serif;color:var(--muted);padding:2px;
}
.legend span{display:inline-flex;align-items:center;gap:6px}
.leg-ring{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--lime-dim);flex:none}
.leg-dot{width:8px;height:8px;border-radius:50%;flex:none}

/* ── Settings ── */
.settings{
  background:var(--panel);border:1px solid var(--line);border-radius:20px;
  padding:16px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--shadow);
}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.settings-label{font:700 10px/1 "JetBrains Mono",monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);white-space:nowrap}
.settings input[type=date]{
  flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  color:var(--ink);font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;padding:10px 12px;
}
.settings input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6)}
.reset-btn{
  font:700 11px/1 "JetBrains Mono",monospace;letter-spacing:.1em;text-transform:uppercase;
  color:var(--rust);background:none;border:1px solid rgba(224,112,58,.25);
  border-radius:10px;padding:12px 14px;cursor:pointer;transition:.12s;text-align:left;
}
.reset-btn:active{background:var(--rust-bg)}

/* ── Lock toggle ── */
.lock-toggle{
  display:flex;align-items:center;gap:9px;
  background:none;border:none;cursor:pointer;padding:0;
}
.lock-pill{
  width:44px;height:26px;border-radius:13px;
  background:var(--lime);position:relative;flex:none;
  transition:background .2s;
}
.lock-pill::after{
  content:'';position:absolute;
  width:20px;height:20px;border-radius:50%;
  background:#13160d;top:3px;left:3px;
  transition:transform .2s cubic-bezier(.16,1,.3,1);
  transform:translateX(18px);
}
.lock-toggle.off .lock-pill{background:var(--faint)}
.lock-toggle.off .lock-pill::after{transform:translateX(0)}
.lock-state{
  font:700 11px/1 "JetBrains Mono",monospace;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--lime);min-width:26px;text-align:right;
}
.lock-toggle.off .lock-state{color:var(--faint)}

/* ── Past / future training cells ── */
.day-cell.train.missed{opacity:.28;border-color:var(--faint);color:var(--faint);cursor:default}
.day-cell.train.future{opacity:.18;border-style:dashed;border-color:var(--faint);color:var(--faint);cursor:default}

/* ── Celebration: cell pop ── */
@keyframes cell-pop{
  0%{transform:scale(1)}
  35%{transform:scale(1.25)}
  100%{transform:scale(1)}
}
.day-cell.celebrate{animation:cell-pop .38s cubic-bezier(.16,1,.3,1) both}

/* expanding burst rings via pseudo-elements */
@keyframes burst-ring{
  0%{transform:scale(1);opacity:.85}
  100%{transform:scale(2.7);opacity:0}
}
.day-cell.celebrate::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid var(--lime);pointer-events:none;
  animation:burst-ring .52s ease-out forwards;
}
.day-cell.celebrate::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(198,247,63,.45);pointer-events:none;
  animation:burst-ring .52s .13s ease-out forwards;
}

/* ── Toast ── */
.celebrate-toast{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 88px);
  left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--lime);color:#13160d;
  font:800 11px/1 "JetBrains Mono",monospace;
  letter-spacing:.12em;text-transform:uppercase;
  padding:11px 22px;border-radius:99px;
  opacity:0;transition:opacity .2s ease,transform .28s cubic-bezier(.16,1,.3,1);
  pointer-events:none;z-index:100;white-space:nowrap;
  box-shadow:0 4px 24px rgba(198,247,63,.35);
}
.celebrate-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<div class="app">
  <div class="topbar">
    <span class="topbar-title">Training Tracker</span>
  </div>
  <div class="scroll-body">
    <div id="status"></div>
    <div class="cycle-nav">
      <div class="cycle-label" id="cycleLabel"></div>
      <div class="nav-seg">
        <button class="nav-btn" id="prev">‹ Prev</button>
        <button class="nav-btn solid" id="now">Today</button>
        <button class="nav-btn" id="next">Next ›</button>
      </div>
    </div>
    <div class="cal-wrap">
      <div id="weeks"></div>
    </div>
    <div class="legend">
      <span><span class="leg-ring"></span>Train (tap to log)</span>
      <span><span class="leg-dot" style="background:var(--lime)"></span>Done</span>
      <span><span class="leg-dot" style="background:var(--blue)"></span>Rest</span>
      <span><span class="leg-dot" style="background:var(--rust)"></span>Deload</span>
    </div>
    <div class="settings">
      <div class="settings-row">
        <span class="settings-label">Cycle start</span>
        <input type="date" id="start">
      </div>
      <div class="settings-row">
        <span class="settings-label">Lock past days</span>
        <button class="lock-toggle" id="lockToggle">
          <span class="lock-state" id="lockLabel">ON</span>
          <span class="lock-pill"></span>
        </button>
      </div>
      <button class="reset-btn" id="reset">Reset all logs</button>
    </div>
  </div>
</div>

<script>
const TRAIN_DAYS=5,WEEK_LEN=7,TRAIN_WEEKS=5;
const CYCLE_WEEKS=TRAIN_WEEKS+1,CYCLE_LEN=CYCLE_WEEKS*WEEK_LEN;
const SESSIONS_PER_CYCLE=TRAIN_WEEKS*TRAIN_DAYS;

const fmt=d=>{const z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;};
const parse=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const dayDiff=(a,b)=>Math.round((parse(b)-parse(a))/86400000);
const lastMonday=()=>{const t=new Date();t.setHours(0,0,0,0);const off=(t.getDay()+6)%7;return fmt(addDays(t,-off));};

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DOW_SHORT=['Su','M','Tu','W','Th','F','Sa'];
function prettyDate(s){const d=parse(s);return `${DAYS_FULL[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}

function classify(dateStr,startStr){
  const diff=dayDiff(startStr,dateStr);
  if(diff<0)return{phase:'pre'};
  const cycleNum=Math.floor(diff/CYCLE_LEN)+1;
  const inCycle=diff%CYCLE_LEN;
  const weekInCycle=Math.floor(inCycle/WEEK_LEN);
  const dayInWeek=inCycle%WEEK_LEN;
  if(weekInCycle===TRAIN_WEEKS)return{phase:'deload',cycleNum,weekInCycle,dayInWeek};
  if(dayInWeek<TRAIN_DAYS)return{phase:'train',cycleNum,weekInCycle,dayInWeek};
  return{phase:'rest',cycleNum,weekInCycle,dayInWeek};
}

const mem={};
async function sget(k){try{const v=localStorage.getItem(k);if(v!=null)return JSON.parse(v);}catch(e){}return(k in mem)?mem[k]:null;}
async function sset(k,v){mem[k]=v;try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
const K_START='tracker:start',K_DONE='tracker:completions',K_LOCKED='tracker:locked';

let START=lastMonday(),DONE={},viewCycle=1,LOCKED=true;
const getToday=()=>fmt(new Date());

function currentCycleNum(){const d=dayDiff(START,getToday());return d<0?1:Math.floor(d/CYCLE_LEN)+1;}

function cycleStats(cycleNum){
  const s0=addDays(parse(START),(cycleNum-1)*CYCLE_LEN);
  let done=0;
  for(let i=0;i<CYCLE_LEN;i++){const ds=fmt(addDays(s0,i));if(classify(ds,START).phase==='train'&&DONE[ds])done++;}
  return{done,total:SESSIONS_PER_CYCLE};
}

function streak(){
  const today=getToday();
  let s=0,cur=parse(today);
  const limit=Math.max(0,dayDiff(START,today))+1;
  for(let i=0;i<limit;i++){
    const ds=fmt(cur);
    if(dayDiff(START,ds)<0)break;
    const c=classify(ds,START);
    if(c.phase==='train'){if(DONE[ds])s++;else break;}
    cur=addDays(cur,-1);
  }
  return s;
}

function autoMarkRecent(n){
  let cur=addDays(parse(getToday()),-1),count=0;
  while(count<n){
    const ds=fmt(cur);
    if(dayDiff(START,ds)<0)break;
    if(classify(ds,START).phase==='train'){DONE[ds]=true;count++;}
    cur=addDays(cur,-1);
  }
}

function updateLockUI(){
  const btn=document.getElementById('lockToggle');
  const lbl=document.getElementById('lockLabel');
  if(!btn)return;
  if(LOCKED){btn.classList.remove('off');lbl.textContent='ON';}
  else{btn.classList.add('off');lbl.textContent='OFF';}
}

function renderStatus(today){
  const c=classify(today,START);
  let cls,name,pres;
  if(c.phase==='pre'){cls='pre';name='Not started';pres='Starts '+prettyDate(START);}
  else if(c.phase==='train'){cls='train';name='Training day';pres=`Week ${c.weekInCycle+1} · Session ${c.dayInWeek+1} of ${TRAIN_DAYS}`;}
  else if(c.phase==='rest'){cls='rest';name='Rest day';pres=`Week ${c.weekInCycle+1} · Recovery`;}
  else{cls='deload';name='Deload week';pres='Full week off — let it adapt';}
  const cur=currentCycleNum(),st=cycleStats(cur),pct=Math.round(st.done/st.total*100);
  document.getElementById('status').innerHTML=`
    <div class="today-card">
      <div class="today-date">${prettyDate(today)}</div>
      <div class="phase-row"><span class="phase-dot ${cls}"></span><span class="phase-text">${name}</span></div>
      <div class="today-sub">${pres}</div>
      <div class="cyc-bar"><div class="cyc-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-k">Cycle</div><div class="stat-v">${cur}<span class="sm">/∞</span></div></div>
      <div class="stat"><div class="stat-k">Sessions</div><div class="stat-v">${st.done}<span class="sm">/${st.total}</span></div></div>
      <div class="stat"><div class="stat-k">Streak</div><div class="stat-v">${streak()}<span class="sm"> sessions</span></div></div>
    </div>`;
}

function renderWeeks(today){
  document.getElementById('cycleLabel').innerHTML=`Macrocycle <em>#${viewCycle}</em>`;
  const s0=addDays(parse(START),(viewCycle-1)*CYCLE_LEN);
  let html='<div class="cal-head"><div></div>';
  for(let d=0;d<7;d++){const date=addDays(s0,d);html+=`<div class="cal-dow">${DOW_SHORT[date.getDay()]}</div>`;}
  html+='</div>';
  for(let w=0;w<CYCLE_WEEKS;w++){
    const isDeload=(w===TRAIN_WEEKS);
    html+=`<div class="week-row${isDeload?' deload':''}"><div class="wn">${isDeload?'D':w+1}</div>`;
    for(let d=0;d<WEEK_LEN;d++){
      const date=addDays(s0,w*WEEK_LEN+d);
      const ds=fmt(date),c=classify(ds,START),n=date.getDate();
      // positive = past, 0 = today, negative = future
      const diff=dayDiff(ds,today);
      const tod=diff===0?' tod':'';
      if(c.phase==='train'){
        const done=!!DONE[ds];
        if(diff===0){
          html+=`<button class="day-cell train${done?' done':''}${tod}" data-d="${ds}">${n}</button>`;
        }else if(diff>0){
          if(LOCKED){
            html+=`<div class="day-cell train${done?' done':' missed'}${tod}">${n}</div>`;
          }else{
            html+=`<button class="day-cell train${done?' done':''}${tod}" data-d="${ds}">${n}</button>`;
          }
        }else{
          html+=`<div class="day-cell train future">${n}</div>`;
        }
      }else if(c.phase==='deload'){
        html+=`<div class="day-cell deload-d${tod}">${n}</div>`;
      }else{
        html+=`<div class="day-cell rest${tod}">${n}</div>`;
      }
    }
    html+='</div>';
  }
  const el=document.getElementById('weeks');
  el.innerHTML=html;
  el.querySelectorAll('button.day-cell.train').forEach(b=>b.addEventListener('click',()=>toggle(b.dataset.d)));
}

function renderAll(){
  const today=getToday();
  renderStatus(today);
  renderWeeks(today);
  document.getElementById('start').value=START;
}

let _toastTimer=null;
function showToast(msg){
  let el=document.getElementById('celebrate-toast');
  if(!el){el=document.createElement('div');el.id='celebrate-toast';el.className='celebrate-toast';document.body.appendChild(el);}
  el.textContent=msg;
  clearTimeout(_toastTimer);
  el.classList.remove('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.classList.add('show');
    _toastTimer=setTimeout(()=>el.classList.remove('show'),2000);
  }));
}

function spawnConfetti(btn){
  const colors=['#c6f73f','rgba(198,247,63,.55)','#f2f0e6'];
  for(let i=0;i<8;i++){
    const angle=(i/8)*2*Math.PI;
    const dist=26+Math.random()*8;
    const p=document.createElement('span');
    p.style.cssText=`position:absolute;width:4px;height:4px;border-radius:50%;background:${colors[i%3]};pointer-events:none;left:calc(50% - 2px);top:calc(50% - 2px);transition:transform .55s cubic-bezier(.16,1,.3,1),opacity .55s ease-out;`;
    btn.appendChild(p);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      p.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(0)`;
      p.style.opacity='0';
    }));
    setTimeout(()=>p.remove(),680);
  }
}

async function toggle(ds){
  const wasEmpty=!DONE[ds];
  if(DONE[ds])delete DONE[ds];else DONE[ds]=true;
  await sset(K_DONE,DONE);
  renderAll();
  if(wasEmpty){
    const btn=document.querySelector(`button.day-cell[data-d="${ds}"]`);
    if(btn){
      btn.classList.add('celebrate');
      spawnConfetti(btn);
      setTimeout(()=>btn.classList.remove('celebrate'),450);
    }
    showToast('Session logged!');
  }
}

document.getElementById('prev').onclick=()=>{if(viewCycle>1){viewCycle--;renderWeeks(getToday());}};
document.getElementById('next').onclick=()=>{viewCycle++;renderWeeks(getToday());};
document.getElementById('now').onclick=()=>{const t=getToday();viewCycle=currentCycleNum();renderWeeks(t);};
document.getElementById('start').onchange=async e=>{START=e.target.value||lastMonday();await sset(K_START,START);viewCycle=currentCycleNum();renderAll();};
document.getElementById('reset').onclick=async()=>{if(confirm('Clear all logged sessions?')){DONE={};await sset(K_DONE,DONE);renderAll();}};
document.getElementById('lockToggle').onclick=async()=>{LOCKED=!LOCKED;await sset(K_LOCKED,LOCKED);updateLockUI();renderWeeks(getToday());};

(async function(){
  const s=await sget(K_START);if(s)START=s;else await sset(K_START,START);
  const d=await sget(K_DONE);
  if(d&&typeof d==='object'&&!Array.isArray(d))DONE=d;
  else if(!d){autoMarkRecent(3);await sset(K_DONE,DONE);}
  const l=await sget(K_LOCKED);if(l!==null)LOCKED=l;
  viewCycle=currentCycleNum();
  updateLockUI();
  renderAll();
})();
</script>
