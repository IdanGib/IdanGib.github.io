<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Page not found — IG Apps</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a0f'/%3E%3Ctext x='32' y='42' font-family='sans-serif' font-size='26' font-weight='700' fill='%23c084fc' text-anchor='middle'%3EIG%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --fg: #f0ece2;
        --accent: #c084fc;
        --muted: #6b7280;
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: "Space Grotesk", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        text-align: center;
        padding: 24px;
        overflow: hidden;
      }

      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 180px;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        z-index: 1;
        pointer-events: none;
        animation: drift 14s ease-in-out infinite alternate;
      }

      .orb-1 {
        width: min(480px, 50vw);
        height: min(480px, 50vh);
        background: radial-gradient(circle, rgba(192, 132, 252, 0.25), transparent 70%);
        top: 0;
        right: 0;
      }

      .orb-2 {
        width: min(360px, 40vw);
        height: min(360px, 40vh);
        background: radial-gradient(circle, rgba(251, 146, 60, 0.18), transparent 70%);
        bottom: 0;
        left: 0;
        animation-delay: -7s;
      }

      @keyframes drift {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(30px, -20px) scale(1.08);
        }
      }

      h1 {
        position: relative;
        z-index: 2;
        font-size: clamp(4rem, 12vw, 8rem);
        font-weight: 700;
        line-height: 1;
        background: linear-gradient(135deg, var(--accent), #f472b6, #fb923c);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p {
        position: relative;
        z-index: 2;
        color: var(--muted);
        font-size: clamp(0.9rem, 1.4vw, 1.1rem);
        letter-spacing: 0.06em;
      }

      .home-link {
        position: relative;
        z-index: 2;
        display: inline-block;
        color: var(--fg);
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 14px 36px;
        border-radius: 999px;
        border: 1px solid transparent;
        background:
          linear-gradient(var(--bg), var(--bg)) padding-box,
          linear-gradient(135deg, var(--accent), #f472b6, #fb923c) border-box;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1),
          box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .home-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(192, 132, 252, 0.3);
      }

      .home-link:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 4px;
      }

      @media (prefers-reduced-motion: reduce) {
        .orb {
          animation: none;
        }

        .home-link {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>

    <h1>404</h1>
    <p>This screen doesn't exist.</p>
    <a href="/" class="home-link">← Back home</a>
  </body>
</html>
